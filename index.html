.st h2{font-family:var(--ft);font-size:1.1rem;color:var(--t);margin-bottom:4px}

.tm{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;margin-bottom:12px;background:var(--card);border-radius:8px;font-size:.7rem;color:var(--t2)}

.ft{text-align:center;padding:20px 16px;color:var(--t3);font-size:.6rem;line-height:1.5}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;overflow:hidden}

.fg{margin-bottom:14px}

@keyframes app{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

function gk(){
var d=new Date();
return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

function gs(s){
var h=0;
for(var i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i);
return function(){
h|=0;
h=h+0x6D2B79F5|0;
var t=Math.imul(h^h>>>15,1|h);
t=t+Math.imul(t^t>>>7,61|t)^t;
return((t^t>>>14)>>>0)/4294967296;
};
}

function gen(t){
var k=t==='day'?gk():t==='week'?'w'+gk():'m'+gk();
var rng=gs(k);
var ps={day:["Сегодня"],week:["Пн","Вт","Ср","Чт","Пт","Сб","Вс"],month:["Энергия","Влияния","Ресурсы","Тайное","Совет","Итог"]};
var c=[];
var u=new Set();
var count=t==='day'?1:t==='week'?7:6;
for(var j=0;j<count;j++){
var x;
do{x=Math.floor(rng()*T.length)}while(u.has(x));
u.add(x);
var card=Object.assign({},T[x]);
card.rev=rng()<.25;
card.p=ps[t][j];
c.push(card);
}
return{type:t,cards:c,t:t==='day'?"Карта дня":t==='week'?"Расклад на неделю":"Расклад на месяц"};
}

function interp(s){
var r=s.cards.filter(function(x){return x.rev}).length;
var n=s.cards.length;
if(s.type==='day'){
var c=s.cards[0];
return c.rev?'Карта "'+c.n+'" указывает на '+c.r:'Карта "'+c.n+'" несёт '+c.m;
}
if(s.type==='week'){
if(r>n/2)return r+' из '+n+' карт перевёрнуты — период внутренней работы и переосмысления.';
if(r===0)return'Все карты прямо — гармоничная неделя впереди!';
return(n-r)+' прямых и '+r+' перевёрнутых — обратите внимание на обе стороны.';
}
if(s.type==='month'){
var revCards=s.cards.filter(function(x){return x.rev});
var straightCards=s.cards.filter(function(x){return!x.rev});
if(revCards.length>straightCards.length)return'Месяц потребует внутренней работы. '+revCards.length+' карт указывают на скрытые аспекты.';
if(revCards.length<straightCards.length)return'Благоприятный месяц для внешней активности. '+straightCards.length+' карт обещают ясность.';
return'Баланс сил. Месяц перемен — используйте обе стороны.';
}
return(n-r)+' прямых и '+r+' перевёрнутых карт — обратите внимание на обе стороны.';
}

function advice(s){
var c=s.cards[0];
if(s.type==='month'){
var allRev=s.cards.every(function(x){return x.rev});
var mostRev=s.cards.filter(function(x){return x.rev}).length>s.cards.length/2;
if(allRev||mostRev)return"Месяц благоприятен для размышлений и планирования.";
return"Используйте энергию месяца для решительных действий.";
}
if(c.id<=21)return c.rev?"Будьте осторожны с решениями.":"Доверяйте интуиции!";
return c.rev?"Обратите внимание на детали.":"Действуйте уверенно.";
}
