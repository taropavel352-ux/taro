<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a1a">
  <title>Таро Мистик</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg-deep: #08081a;
      --bg: #0e0e28;
      --bg-card: #141442;
      --bg-card-hover: #1a1a52;
      --border: #28285c;
      --accent: #9b6dff;
      --accent2: #7c3aed;
      --accent-glow: rgba(155, 109, 255, 0.2);
      --gold: #f0c050;
      --gold-glow: rgba(240, 192, 80, 0.13);
      --magenta: #e879f9;
      --text: #e8e6f0;
      --text2: #a09cc0;
      --text3: #6b6890;
      --font-title: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Inter', -apple-system, sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #root { max-width: 420px; margin: 0 auto; min-height: 100vh; position: relative; }

    .bg-stars {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.2), transparent),
        radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.4), transparent);
    }

    .app-container { position: relative; z-index: 1; padding-bottom: 20px; }

    /* Header */
    .header { padding: 16px; text-align: center; }
    .header .logo { font-size: 2rem; margin-bottom: 8px; }
    .header h1 { font-family: var(--font-title); font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .header p { color: var(--text2); font-size: 0.75rem; margin-top: 4px; }

    /* Theme */
    .theme-switcher { display: flex; gap: 8px; justify-content: center; padding: 8px 16px; }
    .theme-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
    .theme-btn.active { border-color: var(--accent); }
    .theme-btn.dark { background: linear-gradient(135deg, #9b6dff, #7c3aed); }
    .theme-btn.light { background: linear-gradient(135deg, #f5f3f0, #e0dcd6); }

    /* Tabs */
    .tabs { display: flex; gap: 4px; padding: 8px 16px 0; }
    .tab { flex: 1; padding: 10px 8px; text-align: center; border: none; background: transparent; color: var(--text3); font-size: 0.75rem; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.3s; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab .tab-icon { font-size: 1.2rem; display: block; margin-bottom: 2px; }

    /* Spread area */
    .spread-area { padding: 16px; }
    .spread-title { text-align: center; margin-bottom: 8px; }
    .spread-title h2 { font-family: var(--font-title); font-size: 1.2rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .spread-title p { color: var(--text3); font-size: 0.7rem; }

    /* Timer */
    .timer-bar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 16px; margin-bottom: 12px; background: var(--bg-card); border-radius: 8px; }
    .timer-text { font-size: 0.7rem; color: var(--text2); }
    .timer-highlight { color: var(--accent); font-weight: 600; }

    /* Cards Grid */
    .cards-grid { display: grid; gap: 12px; margin-bottom: 16px; }
    .cards-grid.single { grid-template-columns: 1fr; max-width: 160px; margin: 0 auto 16px; }
    .cards-grid.week { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, auto); }
    .cards-grid.week .card-appear:nth-child(1) { grid-column: 2; }
    .cards-grid.week .card-appear:nth-child(2) { grid-column: 3; }
    .cards-grid.week .card-appear:nth-child(3) { grid-column: 4; }
    .cards-grid.week .card-appear:nth-child(4) { grid-column: 3; }
    .cards-grid.week .card-appear:nth-child(5) { grid-column: 2; }
    .cards-grid.week .card-appear:nth-child(6) { grid-column: 1; }
    .cards-grid.week .card-appear:nth-child(7) { grid-column: 2; }

    /* Position Label */
    .position-label { text-align: center; margin-bottom: 4px; font-size: 0.6rem; color: var(--accent); font-weight: 600; text-transform: uppercase; }

    /* Tarot Card */
    .tarot-card { perspective: 800px; cursor: pointer; user-select: none; width: 100%; }
    .tarot-card-inner { position: relative; width: 100%; padding-top: 140%; transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
    .tarot-card.flipped .tarot-card-inner { transform: rotateY(180deg); }
    .card-face { position: absolute; top: 0; left: 0; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; overflow: hidden; }
    .card-back { background: linear-gradient(145deg, #1a1a4a, #0d0d2b); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
    .card-back::before { content: ''; position: absolute; inset: 6px; border: 1px solid var(--accent); border-radius: 6px; opacity: 0.3; }
    .back-symbol { font-size: 1.5rem; opacity: 0.6; }
    .card-front { transform: rotateY(180deg); background: var(--bg-card); border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px; }
    .card-front .reversed-badge { position: absolute; top: 4px; right: 4px; background: rgba(232,121,249,0.2); color: var(--magenta); font-size: 0.5rem; padding: 2px 4px; border-radius: 4px; font-weight: 600; }
    .card-icon { font-size: 1.8rem; margin-bottom: 4px; }
    .card-name { font-family: var(--font-title); font-size: 0.7rem; font-weight: 600; color: var(--text); text-align: center; }

    /* Buttons */
    .btn-flip-all { display: block; width: 100%; max-width: 240px; margin: 0 auto 12px; padding: 12px 20px; border: none; border-radius: 20px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-weight: 600; cursor: pointer; }
    .btn-refresh { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; max-width: 240px; margin: 0 auto; padding: 10px 20px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text2); font-size: 0.8rem; cursor: pointer; }

    /* Reading Section */
    .reading-section { padding: 12px; }
    .reading-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
    .reading-card h3 { font-family: var(--font-title); font-size: 0.9rem; color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .reading-card .card-meaning { display: flex; gap: 8px; }
    .reading-card .card-meaning .emoji { font-size: 1.5rem; flex-shrink: 0; }
    .reading-card .card-meaning .info h4 { font-size: 0.75rem; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .reading-card .card-meaning .info p { font-size: 0.7rem; color: var(--text2); line-height: 1.5; }

    .summary-box { background: var(--bg-card); border: 1px solid var(--accent); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
    .summary-box h3 { font-family: var(--font-title); font-size: 0.95rem; color: var(--accent); margin-bottom: 6px; }
    .summary-box p { font-size: 0.75rem; color: var(--text); line-height: 1.6; }

    .advice-box { background: var(--bg-card); border: 1px solid var(--gold); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
    .advice-box h3 { font-family: var(--font-title); font-size: 0.95rem; color: var(--gold); margin-bottom: 6px; }
    .advice-box p { font-size: 0.75rem; color: var(--text); line-height: 1.6; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
    .modal-content { background: var(--bg); border: 1px solid var(--border); border-radius: 16px; max-width: 280px; width: 100%; padding: 20px; }
    .modal-header { text-align: center; margin-bottom: 16px; }
    .modal-header .icon { font-size: 2.5rem; margin-bottom: 8px; display: block; }
    .modal-header h2 { font-family: var(--font-title); font-size: 1.2rem; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
    .modal-header p { color: var(--text2); font-size: 0.75rem; }

    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 0.75rem; color: var(--text2); margin-bottom: 4px; }
    .form-group input { width: 100%; padding: 10px 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.85rem; }
    .form-group input:focus { outline: none; border-color: var(--accent); }

    .gender-toggle { display: flex; gap: 8px; }
    .gender-option { flex: 1; padding: 8px; background: var(--bg-card); border: 2px solid var(--border); border-radius: 8px; color: var(--text2); font-size: 0.75rem; cursor: pointer; text-align: center; }
    .gender-option.active { border-color: var(--accent); color: var(--accent); }

    .btn { width: 100%; padding: 12px; border: none; border-radius: 20px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }

    .footer { text-align: center; padding: 16px; color: var(--text3); font-size: 0.6rem; }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes cardAppear { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
    .card-appear { animation: cardAppear 0.5s ease forwards; }
    .logo { animation: float 4s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="bg-stars"></div>
  <div id="root"></div>
  <script src="app.js"></script>
</body>
</html>
