<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка — Таро Мистик</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #f8fafc;
      --bg-card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text2: #64748b;
      --accent: #7c3aed;
      --accent-light: #ede9fe;
      --success: #22c55e;
      --danger: #ef4444;
      --gold: #f59e0b;
    }
    
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }
    
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .login-header .icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }
    
    .login-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }
    
    .login-header p {
      color: var(--text2);
      font-size: 0.9rem;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.3s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    
    .btn-primary:hover {
      background: #6d28d9;
      transform: translateY(-1px);
    }
    
    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--danger);
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      display: none;
    }
    
    .error.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="icon">🌙</div>
        <h1>Админ-панель</h1>
        <p>Таро Мистик</p>
      </div>
      
      <div class="error" id="error"></div>
      
      <div class="form-group">
        <label>Логин</label>
        <input type="text" id="username" placeholder="Введите логин" />
      </div>
      
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="password" placeholder="Введите пароль" />
      </div>
      
      <button class="btn btn-primary" id="login-btn">Войти</button>
    </div>
  </div>
  
  <script>
    const API_BASE = '/api';
    
    document.getElementById('login-btn').addEventListener('click', login);
    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
    
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const error = document.getElementById('error');
      
      if (!username || !password) {
        error.textContent = 'Заполните все поля';
        error.classList.add('show');
        return;
      }
      
      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem('admin', JSON.stringify(data.admin));
          window.location.href = 'dashboard.html';
        } else {
          error.textContent = data.error || 'Ошибка входа';
          error.classList.add('show');
        }
      } catch (err) {
        error.textContent = 'Ошибка соединения с сервером';
        error.classList.add('show');
      }
    }
  </script>
</body>
</html>
